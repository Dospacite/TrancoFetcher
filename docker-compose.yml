services:
  tranco-fetcher:
    build:
      context: .
    init: true
    shm_size: 1gb
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/src
      TRANCO_CSV_PATH: /app/tranco_W4XN9.csv
      TRANCO_BATCH_SIZE: ${TRANCO_BATCH_SIZE:-10}
      TRANCO_MAX_CONCURRENCY: ${TRANCO_MAX_CONCURRENCY:-4}
      TRANCO_REQUEST_TIMEOUT_MS: ${TRANCO_REQUEST_TIMEOUT_MS:-5000}
      TRANCO_REQUEST_WAIT_MS: ${TRANCO_REQUEST_WAIT_MS:-3000}
      TRANCO_PREFLIGHT_TIMEOUT_SECONDS: ${TRANCO_PREFLIGHT_TIMEOUT_SECONDS:-5}
      TRANCO_HEADLESS: ${TRANCO_HEADLESS:-true}
      TRANCO_NETWORK_IDLE: ${TRANCO_NETWORK_IDLE:-true}
      TRANCO_DISABLE_RESOURCES: ${TRANCO_DISABLE_RESOURCES:-false}
      TRANCO_SOLVE_CLOUDFLARE: ${TRANCO_SOLVE_CLOUDFLARE:-true}
      TRANCO_BROWSER_LOCALE: ${TRANCO_BROWSER_LOCALE:-en-US}
      TRANCO_BROWSER_TIMEZONE_ID: ${TRANCO_BROWSER_TIMEZONE_ID:-UTC}
      TRANCO_ACCEPT_LANGUAGE: ${TRANCO_ACCEPT_LANGUAGE:-en-US,en;q=0.9}
      TRANCO_DRY_RUN: ${TRANCO_DRY_RUN:-false}
    volumes:
      - ./tranco_W4XN9.csv:/app/tranco_W4XN9.csv:ro
    networks:
      - xai

networks:
  xai:
    external: true
